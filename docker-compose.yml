services:
  server:
    image: oven/bun:1
    container_name: qqbot-server
    restart: unless-stopped
    working_dir: /workspace
    command: >
      sh -c "bun install && bun run --filter @bot/server start"
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    volumes:
      - ./:/workspace
    ports:
      - "3001:3001"
    depends_on:
      - napcat

  dashboard:
    image: oven/bun:1
    container_name: qqbot-dashboard
    restart: unless-stopped
    working_dir: /workspace
    command: >
      sh -c "bun install && bun run --filter @bot/dashboard dev --host 0.0.0.0 --port 4173"
    environment:
      DASHBOARD_API_PROXY_TARGET: "http://server:3001"
    volumes:
      - ./:/workspace
    ports:
      - "4173:4173"
    depends_on:
      - server

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    environment:
      NAPCAT_UID: "1000"
      NAPCAT_GID: "1000"
    ports:
      - "3000:3000"
      - "6099:6099"
    volumes:
      - napcat_qq_data:/app/.config/QQ
      - napcat_config:/app/napcat/config
      - napcat_plugins:/app/napcat/plugins

volumes:
  napcat_qq_data:
  napcat_config:
  napcat_plugins:
