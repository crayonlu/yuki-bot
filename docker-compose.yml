services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: qq-bot-server:local
    container_name: qqbot-server
    restart: unless-stopped
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    volumes:
      - server_data:/workspace/apps/server/data
    depends_on:
      - napcat

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    image: qq-bot-dashboard:local
    container_name: qqbot-dashboard
    restart: unless-stopped
    environment:
      DASHBOARD_API_PROXY_TARGET: "http://server:3001"
    ports:
      - "4173:4173"
    depends_on:
      - server

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: unless-stopped
    environment:
      NAPCAT_UID: "1000"
      NAPCAT_GID: "1000"
    ports:
      - "3000:3000"
      - "6099:6099"
    volumes:
      - napcat_qq_data:/app/.config/QQ
      - napcat_config:/app/napcat/config
      - napcat_plugins:/app/napcat/plugins

volumes:
  server_data:
  napcat_qq_data:
  napcat_config:
  napcat_plugins:
